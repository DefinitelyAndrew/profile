<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>andrew</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        body {
            background-color: #030303;
            background-image: 
                radial-gradient(circle at 15% 15%, #1a1525 0%, transparent 45%),
                radial-gradient(circle at 85% 85%, #0f1c24 0%, transparent 45%),
                radial-gradient(circle at 50% 50%, #0d0d11 0%, transparent 60%);
            color: #f5f5f7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .glow-bg {
            position: absolute;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.04) 0%, transparent 65%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
        }

        .profile-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 450px;
            background: rgba(20, 20, 20, 0.4);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 
                0 30px 100px rgba(0, 0, 0, 0.9),
                inset 0 1px 1px rgba(255, 255, 255, 0.15);
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .profile-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 
                0 30px 100px rgba(0, 0, 0, 0.95),
                inset 0 1px 1px rgba(255, 255, 255, 0.25);
        }

        .avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            margin: 0 auto 20px auto;
            border: 2px solid rgba(255, 255, 255, 0.12);
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
            background: linear-gradient(180deg, #ffffff 0%, #d4d4d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .username {
            font-size: 14px;
            color: #a3a3a3;
            margin-bottom: 16px;
            font-weight: 400;
        }

        .status-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            font-size: 13px;
            color: #e5e5e5;
            font-weight: 500;
        }

        .badge i {
            width: 14px;
            height: 14px;
            color: #a3a3a3;
        }

        .socials-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .social-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 10px 16px;
            border-radius: 12px;
            color: #d4d4d4;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            min-width: 110px;
            transition: all 0.2s ease;
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.15);
            color: #ffffff;
        }

        .social-btn-content {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .social-btn i {
            width: 16px;
            height: 16px;
        }

        .sub-count {
            font-size: 10px;
            color: #737373;
            font-weight: 400;
            margin-top: -2px;
        }

        .projects-section {
            text-align: left;
            margin-top: 10px;
        }

        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #737373;
            margin-bottom: 12px;
            font-weight: 600;
            padding-left: 4px;
        }

        .project-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .project-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 16px 20px;
            border-radius: 14px;
            text-decoration: none;
            color: #e5e5e5;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .project-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            color: #ffffff;
        }

        .project-info {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .project-icon-wrapper {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.04);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #a3a3a3;
            transition: color 0.2s;
        }

        .project-item:hover .project-icon-wrapper {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.08);
        }

        .project-details {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .project-name {
            font-size: 15px;
            font-weight: 500;
        }

        .project-domain {
            font-size: 12px;
            color: #737373;
        }

        .arrow-icon {
            color: #525252;
            transition: transform 0.2s, color 0.2s;
            width: 18px;
            height: 18px;
        }

        .project-item:hover .arrow-icon {
            color: #ffffff;
            transform: translateX(3px);
        }
    </style>
</head>
<body>

    <div class="glow-bg"></div>

    <div class="profile-card">
        <div class="avatar">
            <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=200&auto=format&fit=crop" alt="Profile avatar">
        </div>

        <h1>definitely_andrew</h1>
        <div class="username">about me</div>

        <div class="status-container">
            <div class="badge">
                <i data-lucide="map-pin"></i>
                <span>Singapore</span>
            </div>
            <div class="badge">
                <i data-lucide="clock"></i>
                <span id="sg-time">12:00:00 AM</span>
            </div>
        </div>

        <div class="socials-container">
            <a href="https://youtube.com/@YOUR_YOUTUBE_HANDLE" target="_blank" rel="noopener noreferrer" class="social-btn">
                <div class="social-btn-content">
                    <i data-lucide="youtube"></i>
                    <span>YouTube</span>
                </div>
                <span id="yt-subs" class="sub-count">-- subs</span>
            </a>
            <div class="social-btn" onclick="copyDiscordHandle(this)">
                <div class="social-btn-content">
                    <i data-lucide="message-square"></i>
                    <span id="discord-text">Discord</span>
                </div>
                <span class="sub-count">copy tag</span>
            </div>
        </div>

        <div class="projects-section">
            <div class="section-title">Projects</div>
            <div class="project-list">
                
                <a href="https://sgtransport.onrender.com/" target="_blank" rel="noopener noreferrer" class="project-item">
                    <div class="project-info">
                        <div class="project-icon-wrapper">
                            <i data-lucide="train-front"></i>
                        </div>
                        <div class="project-details">
                            <span class="project-name">SGTransport</span>
                            <span class="project-domain">sgtransport.onrender.com</span>
                        </div>
                    </div>
                    <i data-lucide="arrow-up-right" class="arrow-icon"></i>
                </a>

                <a href="https://telcsg.onrender.com/" target="_blank" rel="noopener noreferrer" class="project-item">
                    <div class="project-info">
                        <div class="project-icon-wrapper">
                            <i data-lucide="subway"></i>
                        </div>
                        <div class="project-details">
                            <span class="project-name">TELCSG Website</span>
                            <span class="project-domain">telcsg.onrender.com</span>
                        </div>
                    </div>
                    <i data-lucide="arrow-up-right" class="arrow-icon"></i>
                </a>

            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function updateSGTime() {
            const options = {
                timeZone: 'Asia/Singapore',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: true
            };
            
            const formatter = new Intl.DateTimeFormat('en-SG', options);
            const timeString = formatter.format(new Date());
            document.getElementById('sg-time').innerText = timeString;
        }

        updateSGTime();
        setInterval(updateSGTime, 1000);

        function copyDiscordHandle(element) {
            const discordUsername = "YOUR_DISCORD_USERNAME";
            navigator.clipboard.writeText(discordUsername).then(() => {
                const textSpan = document.getElementById('discord-text');
                textSpan.innerText = "Copied!";
                setTimeout(() => {
                    textSpan.innerText = "Discord";
                }, 2000);
            });
        }

        async function fetchYouTubeSubs() {
            const apiKey = "YOUR_YOUTUBE_API_KEY";
            const channelId = "YOUR_CHANNEL_ID";
            const url = `https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${channelId}&key=${apiKey}`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                if (data.items && data.items.length > 0) {
                    const subCount = parseInt(data.items[0].statistics.subscriberCount);
                    
                    let formattedSubs = subCount;
                    if (subCount >= 1000000) {
                        formattedSubs = (subCount / 1000000).toFixed(1) + 'M';
                    } else if (subCount >= 1000) {
                        formattedSubs = (subCount / 1000).toFixed(1) + 'K';
                    }
                    
                    document.getElementById('yt-subs').innerText = `${formattedSubs} subs`;
                }
            } catch (error) {
                document.getElementById('yt-subs').innerText = "online";
            }
        }

        fetchYouTubeSubs();

        document.addEventListener('contextmenu', event => event.preventDefault());

        document.addEventListener('keydown', event => {
            if (
                event.key === 'F12' ||
                (event.ctrlKey && event.shiftKey && (event.key === 'I' || event.key === 'J' || event.key === 'C')) ||
                (event.metaKey && event.altKey && (event.key === 'I' || event.key === 'J')) ||
                (event.ctrlKey && event.key === 'U') ||
                (event.metaKey && event.key === 'U')
            ) {
                event.preventDefault();
            }
        });
    </script>
</body>
</html>
