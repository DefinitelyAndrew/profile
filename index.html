<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>andrew</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        body {
            background-color: #030303;
            background-image: 
                radial-gradient(circle at 15% 15%, #1a1525 0%, transparent 45%),
                radial-gradient(circle at 85% 85%, #0f1c24 0%, transparent 45%),
                radial-gradient(circle at 50% 50%, #0d0d11 0%, transparent 60%);
            color: #f5f5f7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .glow-bg {
            position: absolute;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.04) 0%, transparent 65%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
        }

        .profile-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 450px;
            background: rgba(20, 20, 20, 0.4);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 
                0 30px 100px rgba(0, 0, 0, 0.9),
                inset 0 1px 1px rgba(255, 255, 255, 0.15);
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .profile-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 
                0 30px 100px rgba(0, 0, 0, 0.95),
                inset 0 1px 1px rgba(255, 255, 255, 0.25);
        }

        .avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            margin: 0 auto 20px auto;
            border: 2px solid rgba(255, 255, 255, 0.12);
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
            background: linear-gradient(180deg, #ffffff 0%, #d4d4d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .username {
            font-size: 14px;
            color: #a3a3a3;
            margin-bottom: 16px;
            font-weight: 400;
        }

        .status-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            font-size: 13px;
            color: #e5e5e5;
            font-weight: 500;
        }

        .badge i {
            width: 14px;
            height: 14px;
            color: #a3a3a3;
        }

        .socials-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .social-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 10px 16px;
            border-radius: 12px;
            color: #d4d4d4;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            min-width: 110px;
            transition: all 0.2s ease;
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.15);
            color: #ffffff;
        }

        .social-btn-content {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand-icon {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        .sub-count {
            font-size: 10px;
            color: #737373;
            font-weight: 400;
            margin-top: -2px;
        }

        .projects-section {
            text-align: left;
            margin-top: 10px;
        }

        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #737373;
            margin-bottom: 12px;
            font-weight: 600;
            padding-left: 4px;
        }

        .project-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .project-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 16px 20px;
            border-radius: 14px;
            text-decoration: none;
            color: #e5e5e5;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .project-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            color: #ffffff;
        }

        .project-info {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .project-icon-wrapper {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.04);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #a3a3a3;
            transition: color 0.2s;
        }

        .project-item:hover .project-icon-wrapper {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.08);
        }

        .project-details {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .project-name {
            font-size: 15px;
            font-weight: 500;
        }

        .project-domain {
            font-size: 12px;
            color: #737373;
        }

        .arrow-icon {
            color: #525252;
            transition: transform 0.2s, color 0.2s;
            width: 18px;
            height: 18px;
        }

        .project-item:hover .arrow-icon {
            color: #ffffff;
            transform: translateX(3px);
        }
    </style>
</head>
<body>

    <div class="glow-bg"></div>

    <div class="profile-card">
        <div class="avatar">
            <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=200&auto=format&fit=crop" alt="Profile avatar">
        </div>

        <h1>definitely_andrew</h1>
        <div class="username">about me</div>

        <div class="status-container">
            <div class="badge">
                <i data-lucide="map-pin"></i>
                <span>Singapore</span>
            </div>
            <div class="badge">
                <i data-lucide="clock"></i>
                <span id="sg-time">12:00:00 AM</span>
            </div>
        </div>

        <div class="socials-container">
            <a href="https://youtube.com/@definitely_andrew" target="_blank" rel="noopener noreferrer" class="social-btn">
                <div class="social-btn-content">
                    <svg class="brand-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                    <span>YouTube</span>
                </div>
                <span class="sub-count">watch</span>
            </a>
            <div class="social-btn" onclick="copyDiscordHandle(this)">
                <div class="social-btn-content">
                    <svg class="brand-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994.021-.041.001-.09-.041-.106a13.094 13.094 0 0 1-1.873-.894.077.077 0 0 1-.008-.128c.126-.093.252-.19.372-.287a.075.075 0 0 1 .077-.011c3.92 1.793 8.18 1.793 12.061 0a.073.073 0 0 1 .078.009c.12.099.246.195.373.289a.077.077 0 0 1-.006.127 12.298 12.298 0 0 1-1.873.894.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.156-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.156 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.156-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.156 2.418z"/></svg>
                    <span id="discord-text">Discord</span>
                </div>
                <span class="sub-count">copy tag</span>
            </div>
        </div>

        <div class="projects-section">
            <div class="section-title">Projects</div>
            <div class="project-list">
                
                <a href="https://sgtransport.onrender.com/" target="_blank" rel="noopener noreferrer" class="project-item">
                    <div class="project-info">
                        <div class="project-icon-wrapper">
                            <i data-lucide="train-front"></i>
                        </div>
                        <div class="project-details">
                            <span class="project-name">SGTransport</span>
                            <span class="project-domain">sgtransport.onrender.com</span>
                        </div>
                    </div>
                    <i data-lucide="arrow-up-right" class="arrow-icon"></i>
                </a>

                <a href="https://telcsg.onrender.com/" target="_blank" rel="noopener noreferrer" class="project-item">
                    <div class="project-info">
                        <div class="project-icon-wrapper">
                            <i data-lucide="subway"></i>
                        </div>
                        <div class="project-details">
                            <span class="project-name">TELCSG Website</span>
                            <span class="project-domain">telcsg.onrender.com</span>
                        </div>
                    </div>
                    <i data-lucide="arrow-up-right" class="arrow-icon"></i>
                </a>

            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function updateSGTime() {
            const options = {
                timeZone: 'Asia/Singapore',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: true
            };
            
            const formatter = new Intl.DateTimeFormat('en-SG', options);
            const timeString = formatter.format(new Date());
            document.getElementById('sg-time').innerText = timeString;
        }

        updateSGTime();
        setInterval(updateSGTime, 1000);

        function copyDiscordHandle(element) {
            const discordUsername = "papaya69.";
            navigator.clipboard.writeText(discordUsername).then(() => {
                const textSpan = document.getElementById('discord-text');
                textSpan.innerText = "Copied!";
                setTimeout(() => {
                    textSpan.innerText = "Discord";
                }, 2000);
            });
        }

        document.addEventListener('contextmenu', event => event.preventDefault());

        document.addEventListener('keydown', event => {
            if (
                event.key === 'F12' ||
                (event.ctrlKey && event.shiftKey && (event.key === 'I' || event.key === 'J' || event.key === 'C')) ||
                (event.metaKey && event.altKey && (event.key === 'I' || event.key === 'J')) ||
                (event.ctrlKey && event.key === 'U') ||
                (event.metaKey && event.key === 'U')
            ) {
                event.preventDefault();
            }
        });
    </script>
</body>
</html>
